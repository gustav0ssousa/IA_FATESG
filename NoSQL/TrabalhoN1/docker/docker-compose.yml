services:

  mongodb:
    image: mongo:7
    container_name: mongodb_producao_artistica
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: DB_Producao_Artistica

volumes:
  mongo_data:
    driver: local
